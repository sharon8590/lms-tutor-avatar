<!DOCTYPE html>
<html>
<head>
    <title>AI Tutor</title>
</head>
<body>

<h2>🤖 AI Tutor</h2>

<form method="POST">
    <label>Select Subject:</label><br>
    <input type="text" name="subject" required><br><br>

    <label>Ask Your Question:</label><br>
    <textarea name="question" rows="4" cols="50" required></textarea><br><br>

    <button type="submit">Ask AI</button>
</form>

{% if response %}
<hr>
<h3>AI Answer:</h3>
<p>{{ response }}</p>
{% endif %}

<br>
<a href="/user/dashboard">⬅ Back to Dashboard</a>

</body>
</html>
